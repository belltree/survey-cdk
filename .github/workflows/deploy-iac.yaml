name: Deploy IaC to AWS

on:
  push:
    branches:
      - survey-sundai-dev
    paths:
      - ".github/workflows/deploy-iac.yaml"
      - "cdk.json"
      - "cdk.ts"
      - "jest.config.js"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"

  workflow_dispatch:
    inputs:
      system_name:
        description: "Target system (environment)"
        required: true
        default: "survey-sundai-dev"
        type: choice
        options:
          - survey-sundai-dev
          - survey-sundai-stg
          - survey-sundai-prd
      stack_type:
        description: "Target stack type"
        required: true
        default: "regional"
        type: choice
        options:
          - all
          - global
          - regional
      action_name:
        description: "AWS CDK action"
        required: true
        default: "diff"
        type: choice
        options:
          - diff
          - synth
          - deploy
          - list
          - docs
          - doctor

env:
  SYSTEM_NAME: |-
    ${{ 
      github.event.inputs.system_name || 
      (github.ref_name == 'survey-sundai-dev' && 'survey-sundai-dev') || 
      'survey-sundai-dev'
    }}
  STACK_TYPE: |-
    ${{ 
      github.event.inputs.stack_type || 
      (github.ref_name == 'global' && 'global') || 
      (github.ref_name == 'regional' && 'regional') || 
      (github.ref_name == 'all' && 'all') || 
      'regional'
    }}
  ACTION_NAME: |-
    ${{ 
      github.event.inputs.action_name || 'diff'
    }}

jobs:
  # Deploy phase --------------------------------------

  deploy-iac:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    environment: |-
      ${{ 
        github.event.inputs.system_name || 
        (github.ref_name == 'survey-sundai-dev' && 'survey-sundai-dev') || 
        'survey-sundai-dev'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install # --frozen-lockfile

      - name: Install AWS CDK CLI
        run: pnpm add -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Setup environment variables for following steps
        run: |
          SYSTEM_NAME=${{ env.SYSTEM_NAME }}; aws ssm get-parameter \
            --name "/projects/standardai/survey/sundai/${SYSTEM_NAME: -3}/.env.${SYSTEM_NAME: -3}" \
            --query "Parameter.Value" --output text | tee .env.${SYSTEM_NAME: -3}
          grep -v '^#' .env.${SYSTEM_NAME: -3} | grep -v '^$' >> $GITHUB_ENV

      - name: Load .env from SSM and update Lambda environment variables
        shell: bash
        env:
          SYSTEM_NAME: ${{ env.SYSTEM_NAME }}
          STACK_TYPE: ${{ env.STACK_TYPE }}
          ACTION_NAME: ${{ env.ACTION_NAME }}
        run: |
          set -euo pipefail

          ENV_SUFFIX="${SYSTEM_NAME: -3}"
          PARAM_NAME="/projects/standardai/survey/sundai/${ENV_SUFFIX}/.env.${ENV_SUFFIX}"
          ENV_FILE=".env.${ENV_SUFFIX}"

          aws ssm get-parameter \
            --name "${PARAM_NAME}" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text > "${ENV_FILE}"

          STACK_NAME=$SYSTEM_NAME
          IF $STACK_TYPE == "global":
            STACK_NAME="${STACK_NAME}-global"
          ELIF $STACK_TYPE == "all":
            STACK_NAME="--all"

          npx aws-cdk@2 $ACTION_NAME --context system=$SYSTEM_NAME --require-approval never $STACK_NAME
